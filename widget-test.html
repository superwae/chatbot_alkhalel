<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Local Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #0066cc; }
        .info { background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 20px 0; }
        button { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
        button:hover { background: #0052a3; }
    </style>
</head>
<body>
    <h1>Municipality Chatbot - Local Widget Test</h1>
    <div class="info">
        <p>Click the chat button in the bottom-right corner to test the widget.</p>
        <p>This page connects to the production server.</p>
    </div>

    <h3>Controls</h3>
    <button onclick="MunicipalityChatbot.open()">Open Chat</button>
    <button onclick="MunicipalityChatbot.close()">Close Chat</button>
    <button onclick="MunicipalityChatbot.setLanguage('ar')">Arabic</button>
    <button onclick="MunicipalityChatbot.setLanguage('en')">English</button>

    <script>
        window.MunicipalityChatbotConfig = {
            apiUrl: 'http://192.168.100.3:8080',
            position: 'bottom-right',
            themeColor: '#0066cc',
            defaultLang: 'ar',
            title: 'Khalili',
            titleAr: 'خليلي'
        };
    </script>
    <script src="http://192.168.100.3:8080/widget/chatbot-widget.js"></script>
</body>
</html>
